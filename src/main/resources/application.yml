spring:
  application:
    name: dev-assistant

  ai:
    openai:
      base-url: http://localhost:11434
      api-key: ollama
      chat:
        options:
          model: llama3.1
          temperature: 0.7

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.ai: DEBUG
    com.juanruiz: DEBUG